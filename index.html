<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Q4 Drill 2</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Electrolize&display=swap" rel="stylesheet">

<style>
  body{
    background-image: url("https://cdn.wallpapersafari.com/64/66/DQjwep.jpg");
    background-size: cover;
    background-repeat: no-repeat;
    font-family: Electrolize;
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .box{
    background: #1f2933;
    color: white;
    padding: 30px;
    border-radius: 15px;
    width: 400px;

    /* sir i randomly put numbers in the padding and width to see which one fits */
  }

  h1{
    color: #ffc107;
    margin-bottom: 15px;
  }

  label{
    margin-top: 15px; /* sir i added this to make space and not make it look cramped */
    font-size: 14px;
  }

  input{
    border-radius: 15px;
  }
  
  .btn{
    margin-top: 20px; /* same for this sir*/
    background: #ffc107;
    border-radius: 6px; /* sir i made it 6 because it fits */
  }
</style>

</head>
<body>

<div class="box">
  <h1>Heat Index Checker</h1>

  <label for="temp">Degree in °C</label>
<input type="number" id="temp" class="form-control" placeholder="Input degree value">

<label for="humidity">Humidity in %</label>
<input type="number" id="humidity" class="form-control" placeholder="Input percentage value">

<button type="submit" class="btn" onclick="checkHeat()">Check</button>
</div>

<script>
function checkHeat(){

  let temp = Number(document.getElementById("temp").value); // sir i added the word "Number" in the document thingie so that the numbers could add up
  let humidity = Number(document.getElementById("humidity").value); // same for this sir
  var heatIndex = temp + (0.33 * humidity) - 4;

    if(temp <= 0 || humidity <= 0){
    alert("Please input a valid number");
  }
  else{

  switch(true){

    case (heatIndex <= 27):
      alert(heatIndex + "°C" + ", Comfortable/Cool");
      break;

    case (heatIndex <= 32):
      alert(heatIndex + "°C" + ", Warm");
      break;

    case (heatIndex <= 37):
      alert(heatIndex + "°C" + ", Hot");
      break;

    case (heatIndex <= 41):
      alert(heatIndex + "°C" + ", Very Hot/Caution");
      break;

    case (heatIndex >= 42):
      alert(heatIndex + "°C" + ", Extreme Heat/Danger");
      break; // btw sir i submitted at 2:57 im just adding comments at 3 pm
  }
  }

}
</script>

</body>
</html>
