<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Q4 Drill 2</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Electrolize&display=swap" rel="stylesheet">

<style>
  body{
    background-image: url("https://cdn.wallpapersafari.com/64/66/DQjwep.jpg");
    background-size: cover;
    background-repeat: no-repeat;
    font-family: Electrolize;
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .box{
    background: #1f2933;
    color: white;
    padding: 30px;
    border-radius: 15px;
    width: 400px;
  }

  h1{
    color: #ffc107;
    margin-bottom: 15px;
  }

  label{
    margin-top: 15px;
    font-size: 14px;
  }

  input{
    width: 100%;
    padding: 10px;
    border-radius: 15px;
  }
  
  .btn{
    margin-top: 20px;
    background: #ffc107;
    border-radius: 6px;
  }
</style>

</head>
<body>

<div class="box">
  <h1>Heat Index Checker</h1>

  <label for="temp">Degree in °C</label>
  <input type="number" placeholder="Input degree value">

  <label for="humidity">Humidity in %</label>
  <input type ="number" id="temp" class="form-control" placeholder="Input percentage value">

  <button type="submit" id="btn_temp btn_humidity" class="btn" onclick="checkHeat()">Check</button>
</div>

<script>
function checkHeat(){

  let temp = parseFloat(document.getElementById("temp").value);
  let humidity = parseFloat(document.getElementById("humidity").value);

  if (isNaN(temp) || isNaN(humidity)) {
    document.getElementById("result").innerHTML = "Please enter valid values!";
    return;
  }

  let heatIndex = temp + (0.33 * humidity) - 4;

  let status;

  switch(true){

    case (heatIndex <= 27):
      status = "Comfortable / Cool";
      break;

    case (heatIndex >= 28 && heatIndex <= 32):
      status = "Warm";
      break;

    case (heatIndex >= 33 && heatIndex <= 37):
      status = "Hot";
      break;

    case (heatIndex >= 38 && heatIndex <= 41):
      status = "Very Hot / Caution";
      break;

    case (heatIndex >= 42):
      status = "Extreme Heat / Danger";
      break;

    default:
      status = "Unknown";
  }

  document.getElementById("result").innerHTML =
    "Heat Index: " + heatIndex.toFixed(2) + "°C <br>Status: " + status;
}
</script>

</body>
</html>
